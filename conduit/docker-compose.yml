services:
  conduit:
    image: ghcr.io/psiphon-inc/conduit/cli:latest
    container_name: darvag-conduit
    restart: unless-stopped
    user: "0:0"
    command:
      [
        "start",
        "--max-common-clients", "${CONDUIT_MAX_CLIENTS:-50}",
        "--bandwidth", "${CONDUIT_BANDWIDTH:-100}",
        "--data-dir", "/home/conduit/data",
        "--metrics-addr", "0.0.0.0:9090",
      ]
    volumes:
      - conduit-data:/home/conduit/data
    networks:
      - conduit-net
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9090' 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  prometheus:
    image: prom/prometheus:latest
    container_name: darvag-prometheus
    restart: unless-stopped
    user: "0:0"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - conduit-net
    depends_on:
      conduit:
        condition: service_healthy

  grafana:
    image: grafana/grafana:latest
    container_name: darvag-grafana
    restart: unless-stopped
    user: "0:0"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-changeme}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana-provisioning:/etc/grafana/provisioning:ro
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    networks:
      - conduit-net
    depends_on:
      - prometheus

volumes:
  conduit-data:
  prometheus-data:
  grafana-data:

networks:
  conduit-net:
    driver: bridge
